apiVersion: apps/v1
kind: Deployment
metadata:
  name: nids-api
  namespace: nids
  labels:
    app: nids-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nids-api
  template:
    metadata:
      labels:
        app: nids-api
    spec:
      containers:
      - name: nids-api
        image: your-registry/nids-api:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: APP_ENV
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        - name: API_WORKERS
          value: "4"
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: nids-secrets
              key: secret-key
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nids-secrets
              key: db-password
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: model-volume
          mountPath: /app/models
          readOnly: true
        - name: logs-volume
          mountPath: /app/logs
      volumes:
      - name: model-volume
        persistentVolumeClaim:
          claimName: nids-model-pvc
      - name: logs-volume
        persistentVolumeClaim:
          claimName: nids-logs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: nids-api-service
  namespace: nids
spec:
  selector:
    app: nids-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nids-api-hpa
  namespace: nids
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nids-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
