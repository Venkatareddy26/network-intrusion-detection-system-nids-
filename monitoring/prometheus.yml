global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'nids-monitor'

scrape_configs:
  - job_name: 'nids-api'
    static_configs:
      - targets: ['nids-api:8000']
    metrics_path: '/prometheus'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
